<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with dark retro-synthwave theme -->
  <rect width="512" height="512" rx="96" fill="#1b1a30"/>
  
  <!-- Outer glowing border -->
  <rect x="24" y="24" width="464" height="464" rx="72" fill="none" stroke="#ff006e" stroke-width="12" stroke-dasharray="16 12"/>
  
  <!-- Cassette Body -->
  <rect x="64" y="112" width="384" height="288" rx="24" fill="#252445" stroke="#3a86ff" stroke-width="16"/>
  
  <!-- Cassette Label Section -->
  <rect x="96" y="144" width="320" height="160" rx="12" fill="#1b1a30" stroke="#ff006e" stroke-width="8"/>
  
  <!-- Cassette Tape Lines / Decor -->
  <line x1="120" y1="176" x2="392" y2="176" stroke="#3a86ff" stroke-width="8" stroke-linecap="round"/>
  <line x1="120" y1="200" x2="320" y2="200" stroke="#ff006e" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Cassette Wheels Center Section -->
  <rect x="144" y="224" width="224" height="64" rx="32" fill="#0d0c1d" stroke="#3a86ff" stroke-width="6"/>
  
  <!-- Left Wheel (Gear) -->
  <circle cx="192" cy="256" r="20" fill="none" stroke="#fff" stroke-width="6" stroke-dasharray="8 4"/>
  <circle cx="192" cy="256" r="8" fill="#ff006e"/>
  
  <!-- Right Wheel (Gear) -->
  <circle cx="320" cy="256" r="20" fill="none" stroke="#fff" stroke-width="6" stroke-dasharray="8 4"/>
  <circle cx="320" cy="256" r="8" fill="#ff006e"/>
  
  <!-- Trapezoid Bottom Area -->
  <polygon points="128,368 144,320 368,320 384,368" fill="#1b1a30" stroke="#3a86ff" stroke-width="8"/>
  
  <!-- Cassette Screws/Details -->
  <circle cx="88" cy="136" r="6" fill="#3a86ff"/>
  <circle cx="424" cy="136" r="6" fill="#3a86ff"/>
  <circle cx="88" cy="376" r="6" fill="#3a86ff"/>
  <circle cx="424" cy="376" r="6" fill="#3a86ff"/>
</svg>