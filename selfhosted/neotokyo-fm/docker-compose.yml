services:
  server:
    build: ./server
    container_name: neotokyo-server
    ports:
      - "5050:5050"
    volumes:
      - ./server/downloads:/app/downloads
      - ./server/logs:/app/logs
      - ./server/batch_history.db:/app/batch_history.db
      - ./server/playlists:/app/playlists
    environment:
      - PORT=5050
      - HOST=0.0.0.0
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  client:
    build: ./client
    container_name: neotokyo-client
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
